<ul class="projects-list">
    <li class="project" *ngFor="let project of projects">
        <article>
            <header class="project-title">
                <h1>{{ project.title }}</h1>
                <a id="a-Details" [routerLink]="['/projects', project.id]">Detalhes</a>
            </header>

            <section class="project-description">
                <p>Descrição: {{ project.description }}</p>

                <section class="technologies">
                    <p>Tecnologias:</p>
                    <ul>
                        <li *ngFor="let technology of project.technologies">
                            <span>{{ technology.name }}</span>
                        </li>
                    </ul>
                </section>
            </section>
        </article>

        <footer class="project-link">
            <iframe [src]="sanitizar(project.link)" scrolling="no"></iframe>
            <p>Link: <a href="{{ project.link }}" target="_blank"> {{ project.link }}</a></p>
        </footer>
    </li>
</ul>

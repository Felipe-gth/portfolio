<ul class="versions">
    <li *ngFor="let version of versions; let i = index">
        <div class="card" [class.expanded]="expandedIndex === i" (click)="toggle(i)">
            <div class="card-header">
                <p id="version">Versão: {{ version.version }}</p>
                <span class="arrow" [class.open]="expandedIndex === i">
                    <i class="fa-solid fa-caret-down" style="color: #f0e8d4;"></i>
                </span>
            </div>
            <div class="card-body" *ngIf="expandedIndex === i" @expand>
                <p>Descrição: {{ version.description }}</p>
            </div>
        </div>
    </li>
</ul>
